<html lang="en">
<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4fa;font-family:'JetBrains Mono','Courier New',monospace;color:#1e3a5f}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#e8eaf0}
::-webkit-scrollbar-thumb{background:#e6920a;border-radius:3px}
input:focus,select:focus{outline:none !important;border-color:#e6920a !important;box-shadow:0 0 0 2px #e6920a22 !important}
.row-tr:hover td{background-color:rgba(240,245,255,.7) !important;}
.act-btn{opacity:0;transition:opacity .15s}
.row-tr:hover .act-btn{opacity:1}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeIn .2s ease forwards}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.pulsing{animation:pulse .8s infinite}
.cell-input{background:#fff;border:2px solid #7c3aed;color:#1e3a5f;padding:2px 4px;font-family:inherit;font-size:12px;font-weight:700;width:60px;border-radius:3px;text-align:center}
.cell-input:focus{outline:none}
.sv{display:inline-block;padding:2px 8px;font-weight:700;font-size:13px;border-radius:3px;cursor:pointer;transition:background .15s;min-width:38px;text-align:center}
.sv:hover{background:rgba(0,0,0,.07)}
.modal-overlay{position:fixed;inset:0;background:rgba(15,30,60,.45);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-box{background:#fff;border-radius:10px;box-shadow:0 24px 64px rgba(15,30,60,.18);padding:28px;width:660px;max-height:90vh;overflow-y:auto}
.toast{position:fixed;bottom:28px;right:28px;background:#1e3a5f;color:#fff;padding:10px 20px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:1px;border-left:4px solid #e6920a;z-index:999;animation:fadeIn .2s ease;box-shadow:0 4px 16px rgba(30,58,95,.35)}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useCallback } = React;

const DEFAULT_MATERIAL_TYPES = [
  { id:"mt_pet100",  name:"PET 100",           length:2.44, width:1.22, density:100,  color:"#1d4ed8" },
  { id:"mt_pet115",  name:"PET 115",           length:2.44, width:1.22, density:115,  color:"#2563a8" },
  { id:"mt_pet135",  name:"PET 135",           length:2.44, width:1.22, density:135,  color:"#3b7dd8" },
  { id:"mt_pet150",  name:"PET 150",           length:2.44, width:1.22, density:150,  color:"#0891b2" },
  { id:"mt_pet200",  name:"PET 200",           length:2.30, width:1.15, density:200,  color:"#0e7490" },
  { id:"mt_pvc60",   name:"PVC 60",            length:2.44, width:1.22, density:60,   color:"#7c3aed" },
  { id:"mt_pvc100",  name:"PVC 100",           length:2.44, width:1.22, density:100,  color:"#9b3090" },
  { id:"mt_pvc115",  name:"PVC 115",           length:2.44, width:1.22, density:115,  color:"#a855f7" },
  { id:"mt_pvc135",  name:"PVC 135",           length:2.44, width:1.22, density:135,  color:"#c026d3" },
  { id:"mt_pvc150",  name:"PVC 150",           length:2.44, width:1.22, density:150,  color:"#db2777" },
  { id:"mt_pvc200",  name:"PVC 200",           length:2.44, width:1.22, density:200,  color:"#e11d48" },
  { id:"mt_balsar",  name:"BALSA RIGID",       length:2.44, width:1.22, density:200,  color:"#d35400" },
  { id:"mt_balsaf",  name:"BALSA FLEXIBLE",    length:2.44, width:1.22, density:150,  color:"#c87530" },
  { id:"mt_balsasf", name:"BALSA SEMI FLEXIBLE",length:2.44,width:1.22, density:175,  color:"#b45309" },
];

const DEFAULT_SURFACES = ["SEALED","COATED","PRIMED","PAINTED","GELCOAT","PEEL PLY"];
const PALETTE  = ["#2563a8","#c87530","#2d8a3e","#9b3090","#c0392b","#16a085","#d35400","#2c3e50","#e6920a","#0891b2"];

const DEFAULT_SHELL_COLS = [
  { id:"sc_suction_balsa",  label:"Suction - BALSA",  color:"#c87530", itemCode:"", itemRev:"A" },
  { id:"sc_suction_pet",    label:"Suction - PET",    color:"#2563a8", itemCode:"", itemRev:"A" },
  { id:"sc_pressure_pet",   label:"Pressure - PET",   color:"#2563a8", itemCode:"", itemRev:"A" },
  { id:"sc_pressure_balsa", label:"Pressure - BALSA", color:"#c87530", itemCode:"", itemRev:"A" },
];

const getRowBg = (t, mts) => {
  const mt = mts.find(m=>m.name===t);
  return mt ? mt.color+"18" : "#f5f5ff";
};
const getAccent = (t, mts) => {
  const mt = mts.find(m=>m.name===t);
  return mt ? mt.color : "#6655aa";
};

const calcColStats = (sheets, r, extraPct=0) => {
  const mult = 1 + (extraPct||0)/100;
  const L = r.length||0, W = r.width||0, T = r.thickness||0, D = r.density||0;
  const sqm = (sheets||0) * L * W;
  const vol = sqm * T;
  const wt  = vol * D;
  return { sheets:sheets||0, sqm:sqm*mult, vol:vol*mult, wt:wt*mult, sqmBase:sqm, volBase:vol, wtBase:wt };
};

const mkRow = (shellCols, matTypes) => {
  const shellData = {};
  shellCols.forEach(c => { shellData[c.id] = 0; });
  const def = matTypes[0] || { name:"PET 100", length:2.44, width:1.22, density:100 };
  return {
    id: Date.now() + Math.random(),
    description:"", type:def.name, supplier:"", finishing:"",
    surface:"SEALED", length:def.length, width:def.width,
    thickness:0.01, density:def.density,
    ...shellData,
  };
};

const calcRow = (r, shellCols, extraPct=0) => {
  const colStats = {};
  let totalSheets=0, totalSqm=0, totalVol=0, totalWt=0;
  shellCols.forEach(c => {
    const sheets = r[c.id] || 0;
    const s = calcColStats(sheets, r, extraPct);
    colStats[c.id] = s;
    totalSheets += s.sheets; totalSqm += s.sqm; totalVol += s.vol; totalWt += s.wt;
  });
  return { ...r, colStats, totalSheets, totalSqm, totalVol, totalWt };
};

const iStyle = {background:"#f8fafc",border:"1px solid #d0dcea",color:"#1e3a5f",padding:"5px 10px",fontSize:11,fontFamily:"'JetBrains Mono',monospace",width:"100%",borderRadius:3};
const TD = {padding:"6px 8px",borderRight:"1px solid #e4eaf4",whiteSpace:"nowrap",fontSize:11,color:"#2c4a72"};
const TH = {padding:"8px 10px",color:"#3b5a8a",fontWeight:700,letterSpacing:.6,textAlign:"left",whiteSpace:"nowrap",fontSize:9,borderRight:"1px solid #c8d8ee",background:"#e8f0fb"};
const btnPrimary = {background:"#e6920a",color:"#fff",border:"none",padding:"7px 18px",fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,cursor:"pointer",letterSpacing:1,borderRadius:5,boxShadow:"0 2px 6px rgba(230,146,10,.25)"};
const btnSmall   = {background:"transparent",border:"1.5px solid #e6920a",color:"#e6920a",padding:"3px 8px",fontSize:11,fontFamily:"inherit",cursor:"pointer",borderRadius:4};

/* ── Simple undo hook ── */
function useUndoRows(init) {
  const [stack, setStack] = useState([init]);
  const [ptr,   setPtr]   = useState(0);
  const current = stack[ptr];

  const set = useCallback(fn => {
    setStack(prev => {
      const base = prev[ptr];
      const next = typeof fn === "function" ? fn(base) : fn;
      const trimmed = prev.slice(0, ptr + 1);
      trimmed.push(next);
      if (trimmed.length > 50) trimmed.shift();
      return trimmed;
    });
    setPtr(p => Math.min(p + 1, 49));
  }, [ptr]);

  const undo = useCallback(() => {
    setPtr(p => Math.max(0, p - 1));
  }, []);

  const canUndo = ptr > 0;
  return [current, set, undo, canUndo];
}

/* ════════════════════════════════════════════════════════════ */

// ══════════════════════════════════════════════════════════════
// ANALYTICS MODAL COMPONENT
// ══════════════════════════════════════════════════════════════
function AnalyticsModal({ computed, shellCols, matTypes, totals, header, onClose }) {
  const { useState, useEffect, useRef, useMemo } = React;
  const [pivotRow,    setPivotRow]    = useState("type");      // rows: type|shell
  const [pivotMetric, setPivotMetric] = useState("wt");        // wt|sqm|vol|sheets
  const [chartType,   setChartType]   = useState("bar");       // bar|pie|donut|stacked
  const [activeTab,   setActiveTab]   = useState("charts");    // charts|pivot|summary
  const barRef   = useRef(null);
  const pieRef   = useRef(null);
  const donutRef = useRef(null);

  // ── Metric helpers ───────────────────────────────────────────
  const metricLabel = {wt:"Weight (kg)", sqm:"Area (m²)", vol:"Volume (m³)", sheets:"No. of Sheets"};
  const metricFmt   = (v,m) => m==="sheets"?v.toFixed(2):v.toFixed(3);
  const metricColor = {wt:"#e6920a", sqm:"#2563a8", vol:"#2d8a3e", sheets:"#6b3fb5"};

  // ── Pivot data: by material type ────────────────────────────
  const byMaterial = useMemo(()=>{
    return matTypes.map(m=>{
      const rows = computed.filter(r=>r.type===m.name);
      return {
        name: m.name, color: m.color,
        wt:     rows.reduce((a,r)=>a+r.totalWt,0),
        sqm:    rows.reduce((a,r)=>a+r.totalSqm,0),
        vol:    rows.reduce((a,r)=>a+r.totalVol,0),
        sheets: rows.reduce((a,r)=>a+r.totalSheets,0),
      };
    }).filter(m=>m[pivotMetric]>0);
  }, [computed, matTypes, pivotMetric]);

  // ── Pivot data: by shell column ──────────────────────────────
  const byShell = useMemo(()=>{
    return shellCols.map(c=>{
      const ct = totals.colTotals[c.id]||{sheets:0,sqm:0,vol:0,wt:0};
      return {name:c.label, color:c.color, wt:ct.wt, sqm:ct.sqm, vol:ct.vol, sheets:ct.sheets};
    }).filter(c=>c[pivotMetric]>0);
  }, [shellCols, totals, pivotMetric]);

  // ── Cross-pivot: material × shell ────────────────────────────
  const crossPivot = useMemo(()=>{
    return matTypes.map(m=>{
      const entry = {name:m.name, color:m.color};
      shellCols.forEach(c=>{
        const rows = computed.filter(r=>r.type===m.name);
        const ct   = rows.reduce((a,r)=>{
          const s=r.colStats[c.id]||{sheets:0,sqm:0,vol:0,wt:0};
          return {wt:a.wt+s.wt, sqm:a.sqm+s.sqm, vol:a.vol+s.vol, sheets:a.sheets+s.sheets};
        },{wt:0,sqm:0,vol:0,sheets:0});
        entry[c.id] = ct;
      });
      return entry;
    });
  }, [computed, matTypes, shellCols, pivotMetric]);

  const chartData = pivotRow==="type" ? byMaterial : byShell;
  const total     = chartData.reduce((a,d)=>a+d[pivotMetric],0);

  // ── Draw Bar chart ───────────────────────────────────────────
  const drawBar = (canvas, data, metric, stacked=false) => {
    if (!canvas || !data.length) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0,0,W,H);
    const pad = {top:30, right:20, bottom:70, left:70};
    const cw = W-pad.left-pad.right, ch = H-pad.top-pad.bottom;
    const maxVal = Math.max(...data.map(d=>d[metric])) * 1.15 || 1;
    const barW = Math.min(52, (cw/data.length)*0.62);
    const gap  = cw/data.length;

    // grid lines
    ctx.strokeStyle="#e4eaf4"; ctx.lineWidth=1;
    for(let i=0;i<=4;i++){
      const y=pad.top+ch*(1-i/4);
      ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+cw,y); ctx.stroke();
      ctx.fillStyle="#94a3b8"; ctx.font="10px 'JetBrains Mono',monospace"; ctx.textAlign="right";
      const v=maxVal*i/4;
      ctx.fillText(metric==="sheets"?Math.round(v).toString():metric==="vol"?v.toFixed(3):v.toFixed(2), pad.left-6, y+4);
    }

    // bars
    data.forEach((d,i)=>{
      const x = pad.left + i*gap + gap/2 - barW/2;
      const bh = (d[metric]/maxVal)*ch;
      const y  = pad.top+ch-bh;
      // shadow
      ctx.fillStyle="rgba(0,0,0,.06)";
      ctx.fillRect(x+3, y+3, barW, bh);
      // bar gradient
      const grad = ctx.createLinearGradient(x,y,x,y+bh);
      grad.addColorStop(0, d.color);
      grad.addColorStop(1, d.color+"88");
      ctx.fillStyle=grad;
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(x,y,barW,bh,4) : ctx.rect(x,y,barW,bh);
      ctx.fill();
      // value label
      ctx.fillStyle="#1e3a5f"; ctx.font="bold 10px 'JetBrains Mono',monospace"; ctx.textAlign="center";
      const vLabel = metric==="sheets"?Math.round(d[metric]).toString():d[metric].toFixed(2);
      ctx.fillText(vLabel, x+barW/2, y-5);
      // x label
      ctx.fillStyle="#4a6fa8"; ctx.font="9px 'JetBrains Mono',monospace";
      const words=d.name.split(" ");
      words.forEach((w,wi)=>ctx.fillText(w, x+barW/2, pad.top+ch+14+wi*12));
    });

    // axis lines
    ctx.strokeStyle="#c8d8ee"; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(pad.left,pad.top); ctx.lineTo(pad.left,pad.top+ch); ctx.lineTo(pad.left+cw,pad.top+ch); ctx.stroke();
  };

  // ── Draw Pie/Donut ───────────────────────────────────────────
  const drawPie = (canvas, data, metric, donut=false) => {
    if (!canvas || !data.length) return;
    const ctx = canvas.getContext("2d");
    const W=canvas.width, H=canvas.height;
    ctx.clearRect(0,0,W,H);
    const cx=W*0.42, cy=H/2, r=Math.min(cx,cy)*0.78, ir=donut?r*0.52:0;
    const total = data.reduce((a,d)=>a+d[metric],0)||1;
    let angle = -Math.PI/2;
    data.forEach((d,i)=>{
      const slice = (d[metric]/total)*Math.PI*2;
      // shadow
      ctx.save(); ctx.shadowColor="rgba(0,0,0,.12)"; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,angle,angle+slice); ctx.closePath();
      ctx.fillStyle=d.color; ctx.fill(); ctx.restore();
      if(donut){ctx.beginPath();ctx.arc(cx,cy,ir,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();}
      // border
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,angle,angle+slice); ctx.closePath();
      ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.stroke();
      // percent label inside slice
      if(slice>0.18){
        const midA=angle+slice/2, lx=cx+Math.cos(midA)*(r*(donut?0.72:0.6)), ly=cy+Math.sin(midA)*(r*(donut?0.72:0.6));
        ctx.fillStyle="#fff"; ctx.font="bold 10px 'JetBrains Mono',monospace"; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText(((d[metric]/total)*100).toFixed(1)+"%", lx, ly);
      }
      angle+=slice;
    });
    // donut center text
    if(donut){
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillStyle="#1e3a5f"; ctx.font="bold 13px 'Barlow Condensed',sans-serif";
      ctx.fillText("TOTAL", cx, cy-10);
      ctx.font="bold 16px 'Barlow Condensed',sans-serif"; ctx.fillStyle="#e6920a";
      const tv=metric==="sheets"?Math.round(total).toString():total.toFixed(2);
      ctx.fillText(tv, cx, cy+8);
    }
    // legend
    const lx=W*0.82, ly=H/2 - (data.length*22)/2;
    data.forEach((d,i)=>{
      ctx.fillStyle=d.color; ctx.fillRect(lx,ly+i*22,12,12);
      ctx.fillStyle="#1e3a5f"; ctx.font="10px 'JetBrains Mono',monospace"; ctx.textAlign="left"; ctx.textBaseline="top";
      const nm=d.name.length>12?d.name.slice(0,11)+"\u2026":d.name;
      ctx.fillText(nm, lx+17, ly+i*22);
    });
  };

  // ── Redraw on data/type change ───────────────────────────────
  useEffect(()=>{
    if(activeTab!=="charts") return;
    setTimeout(()=>{
      if(chartType==="bar"||chartType==="stacked") drawBar(barRef.current, chartData, pivotMetric);
      if(chartType==="pie")   drawPie(pieRef.current, chartData, pivotMetric, false);
      if(chartType==="donut") drawPie(donutRef.current, chartData, pivotMetric, true);
    },50);
  }, [chartData, chartType, pivotMetric, pivotRow, activeTab]);

  const tabStyle = (t) => ({
    padding:"7px 18px", fontSize:10, fontFamily:"inherit", fontWeight:700, cursor:"pointer",
    borderBottom: activeTab===t?"3px solid #e6920a":"3px solid transparent",
    background:"transparent", border:"none", borderBottom: activeTab===t?"3px solid #e6920a":"3px solid transparent",
    color: activeTab===t?"#e6920a":"#94a3b8", transition:"all .15s", letterSpacing:.5,
  });

  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-box" style={{width:"min(96vw,960px)",maxHeight:"92vh",padding:0,overflow:"hidden",display:"flex",flexDirection:"column",borderRadius:12}}>

        {/* Header */}
        <div style={{background:"linear-gradient(135deg,#1e3a5f,#2d5a8e)",padding:"16px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:22,color:"#fff",letterSpacing:2}}>📊 ANALYTICS</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,.6)",letterSpacing:1.5,marginTop:2}}>{header.article||"PROJECT"} · {computed.length} MATERIALS</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.2)",color:"#fff",width:32,height:32,borderRadius:"50%",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>

        {/* Tab bar */}
        <div style={{display:"flex",borderBottom:"1px solid #e4eaf4",background:"#fafbff",padding:"0 24px",flexShrink:0}}>
          {[["charts","📈 CHARTS"],["pivot","⊞ PIVOT TABLE"],["summary","▦ SUMMARY"]].map(([t,l])=>(
            <button key={t} onClick={()=>setActiveTab(t)} style={tabStyle(t)}>{l}</button>
          ))}
        </div>

        {/* Controls bar */}
        <div style={{display:"flex",gap:10,padding:"10px 24px",background:"#f4f7fb",borderBottom:"1px solid #e4eaf4",flexWrap:"wrap",alignItems:"center",flexShrink:0}}>
          <div style={{fontSize:8,color:"#94a3b8",fontWeight:700,letterSpacing:1}}>GROUP BY</div>
          {[["type","Material Type"],["shell","Shell Column"]].map(([k,l])=>(
            <button key={k} onClick={()=>setPivotRow(k)} style={{padding:"4px 12px",fontSize:9,fontFamily:"inherit",fontWeight:700,borderRadius:4,cursor:"pointer",border:"1.5px solid "+(pivotRow===k?"#1e3a5f":"#d0dcea"),background:pivotRow===k?"#1e3a5f":"#fff",color:pivotRow===k?"#e6920a":"#94a3b8",transition:"all .12s"}}>{l}</button>
          ))}
          <div style={{width:1,height:20,background:"#dce8f4",margin:"0 4px"}}/>
          <div style={{fontSize:8,color:"#94a3b8",fontWeight:700,letterSpacing:1}}>METRIC</div>
          {[["wt","WT kg","#e6920a"],["sqm","SQM m²","#2563a8"],["vol","VOL m³","#2d8a3e"],["sheets","SHEETS","#6b3fb5"]].map(([k,l,c])=>(
            <button key={k} onClick={()=>setPivotMetric(k)} style={{padding:"4px 12px",fontSize:9,fontFamily:"inherit",fontWeight:700,borderRadius:4,cursor:"pointer",border:"1.5px solid "+(pivotMetric===k?c:"#d0dcea"),background:pivotMetric===k?c+"15":"#fff",color:pivotMetric===k?c:"#94a3b8",transition:"all .12s"}}>{l}</button>
          ))}
          {activeTab==="charts"&&<>
            <div style={{width:1,height:20,background:"#dce8f4",margin:"0 4px"}}/>
            <div style={{fontSize:8,color:"#94a3b8",fontWeight:700,letterSpacing:1}}>CHART</div>
            {[["bar","▊ Bar"],["pie","◕ Pie"],["donut","◎ Donut"]].map(([k,l])=>(
              <button key={k} onClick={()=>setChartType(k)} style={{padding:"4px 12px",fontSize:9,fontFamily:"inherit",fontWeight:700,borderRadius:4,cursor:"pointer",border:"1.5px solid "+(chartType===k?"#e6920a":"#d0dcea"),background:chartType===k?"#fff4e0":"#fff",color:chartType===k?"#e6920a":"#94a3b8",transition:"all .12s"}}>{l}</button>
            ))}
          </>}
        </div>

        {/* Content */}
        <div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>

          {/* ── CHARTS TAB ── */}
          {activeTab==="charts"&&(
            <div>
              <div style={{textAlign:"center",marginBottom:8,fontSize:9,color:"#94a3b8",letterSpacing:1,fontWeight:700}}>{metricLabel[pivotMetric].toUpperCase()} BY {pivotRow==="type"?"MATERIAL TYPE":"SHELL COLUMN"}</div>
              {chartData.length===0&&<div style={{textAlign:"center",padding:"40px",color:"#ccc",fontSize:11}}>No data to display. Add rows with sheet counts.</div>}
              {chartData.length>0&&(
                <>
                  {chartType==="bar"&&<canvas ref={barRef}   width={860} height={320} style={{width:"100%",height:"auto",borderRadius:8,background:"#fafbff",border:"1px solid #e4eaf4"}}/>}

                  {/* Mini stat cards */}
                  <div style={{display:"flex",gap:8,marginTop:14,flexWrap:"wrap"}}>
                    {chartData.map(d=>(
                      <div key={d.name} style={{flex:"1 1 120px",background:"#fff",border:"1.5px solid "+d.color+"33",borderLeft:"3px solid "+d.color,borderRadius:6,padding:"8px 12px"}}>
                        <div style={{fontSize:8,color:d.color,fontWeight:800,letterSpacing:.8,marginBottom:3,fontFamily:"'Barlow Condensed',sans-serif"}}>{d.name}</div>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:800,color:"#1e3a5f"}}>{metricFmt(d[pivotMetric],pivotMetric)}</div>
                        <div style={{fontSize:8,color:"#94a3b8",marginTop:1}}>{((d[pivotMetric]/total)*100).toFixed(1)}% of total</div>
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>
          )}

          {/* ── PIVOT TABLE TAB ── */}
          {activeTab==="pivot"&&(
            <div>
              <div style={{fontSize:9,color:"#94a3b8",letterSpacing:1,fontWeight:700,marginBottom:12}}>CROSS-PIVOT: MATERIAL TYPE × SHELL COLUMN — {metricLabel[pivotMetric].toUpperCase()}</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                  <thead>
                    <tr style={{background:"#1e3a5f"}}>
                      <th style={{padding:"8px 12px",color:"#e6920a",fontWeight:800,textAlign:"left",fontSize:9,letterSpacing:1,borderRight:"1px solid #2d5a8e",minWidth:140}}>MATERIAL TYPE</th>
                      {shellCols.map(c=>(
                        <th key={c.id} style={{padding:"8px 10px",color:c.color,fontWeight:800,textAlign:"center",fontSize:9,letterSpacing:.5,borderRight:"1px solid #2d5a8e",minWidth:100,lineHeight:1.4}}>
                          <div>{c.label}</div>
                          {c.itemCode&&<div style={{fontSize:7,color:"rgba(255,255,255,.5)",fontWeight:400}}>{c.itemCode}</div>}
                        </th>
                      ))}
                      <th style={{padding:"8px 10px",color:"#e6920a",fontWeight:800,textAlign:"center",fontSize:9,background:"#162d4a",minWidth:90}}>TOTAL</th>
                    </tr>
                  </thead>
                  <tbody>
                    {crossPivot.map((m,i)=>{
                      const rowTotal=shellCols.reduce((a,c)=>a+(m[c.id]?m[c.id][pivotMetric]:0),0);
                      if(rowTotal===0) return null;
                      const maxInRow=Math.max(...shellCols.map(c=>m[c.id]?m[c.id][pivotMetric]:0));
                      return (
                        <tr key={m.name} style={{background:i%2===0?"#fff":"#f8fbff",borderBottom:"1px solid #e4eaf4"}}>
                          <td style={{padding:"8px 12px",fontWeight:700,color:m.color,borderRight:"2px solid "+m.color+"33",fontSize:10}}>
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              <div style={{width:8,height:8,borderRadius:"50%",background:m.color,flexShrink:0}}/>
                              {m.name}
                            </div>
                          </td>
                          {shellCols.map(c=>{
                            const val=m[c.id]?m[c.id][pivotMetric]:0;
                            const pct=maxInRow>0?(val/maxInRow)*100:0;
                            return (
                              <td key={c.id} style={{padding:"6px 10px",textAlign:"center",borderRight:"1px solid #e4eaf4",position:"relative"}}>
                                {val>0&&<div style={{position:"absolute",bottom:0,left:0,height:"3px",width:pct+"%",background:c.color+"66",borderRadius:"0 2px 0 0"}}/>}
                                <span style={{fontWeight:val>0?700:400,color:val>0?metricColor[pivotMetric]:"#ddd",position:"relative"}}>
                                  {val>0?metricFmt(val,pivotMetric):"—"}
                                </span>
                              </td>
                            );
                          })}
                          <td style={{padding:"6px 10px",textAlign:"center",fontWeight:800,color:metricColor[pivotMetric],background:metricColor[pivotMetric]+"0e"}}>
                            {metricFmt(rowTotal,pivotMetric)}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot>
                    <tr style={{background:"#f0f5ff",borderTop:"2px solid #e6920a"}}>
                      <td style={{padding:"8px 12px",fontWeight:800,color:"#e6920a",fontSize:9,letterSpacing:.5}}>COLUMN TOTAL</td>
                      {shellCols.map(c=>{
                        const ct=totals.colTotals[c.id]||{sheets:0,sqm:0,vol:0,wt:0};
                        return <td key={c.id} style={{padding:"8px 10px",textAlign:"center",fontWeight:800,color:c.color,borderRight:"1px solid #e4eaf4"}}>{metricFmt(ct[pivotMetric],pivotMetric)}</td>;
                      })}
                      <td style={{padding:"8px 10px",textAlign:"center",fontWeight:800,fontSize:12,color:"#e6920a"}}>{metricFmt(pivotMetric==="sheets"?totals.totalSheets:pivotMetric==="sqm"?totals.totalSqm:pivotMetric==="vol"?totals.totalVol:totals.totalWt,pivotMetric)}</td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>
          )}

          {/* ── SUMMARY TAB ── */}
          {activeTab==="summary"&&(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12,marginBottom:20}}>
                {[
                  ["TOTAL WEIGHT","#e6920a","#fff4e0",totals.totalWt.toFixed(3),"kg"],
                  ["TOTAL SQM","#2563a8","#eff6ff",totals.totalSqm.toFixed(3),"m²"],
                  ["TOTAL VOLUME","#2d8a3e","#f0fdf4",totals.totalVol.toFixed(3),"m³"],
                  ["TOTAL SHEETS","#6b3fb5","#ede8fb",totals.totalSheets.toString(),"sheets"],
                  ["MATERIALS","#0891b2","#ecfeff",computed.length.toString(),"rows"],
                  ["SHELL COLS","#db2777","#fdf2f8",shellCols.length.toString(),"parts"],
                ].map(([l,c,bg,v,u])=>(
                  <div key={l} style={{background:bg,border:"1.5px solid "+c+"33",borderRadius:8,padding:"14px 18px",borderLeft:"4px solid "+c}}>
                    <div style={{fontSize:8,color:c,fontWeight:800,letterSpacing:1.2,marginBottom:6,fontFamily:"'Barlow Condensed',sans-serif"}}>{l}</div>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:800,color:"#1e3a5f",lineHeight:1}}>{v}</div>
                    <div style={{fontSize:9,color:c,marginTop:3,fontWeight:600}}>{u}</div>
                  </div>
                ))}
              </div>

              {/* Per-material breakdown bars */}
              <div style={{fontSize:9,color:"#94a3b8",fontWeight:700,letterSpacing:1,marginBottom:10}}>BREAKDOWN BY MATERIAL · {metricLabel[pivotMetric].toUpperCase()}</div>
              {byMaterial.map(m=>{
                const pct=total>0?(m[pivotMetric]/total)*100:0;
                return (
                  <div key={m.name} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <div style={{width:8,height:8,borderRadius:2,background:m.color}}/>
                        <span style={{fontSize:10,fontWeight:700,color:m.color}}>{m.name}</span>
                      </div>
                      <div style={{display:"flex",gap:10,alignItems:"baseline"}}>
                        <span style={{fontSize:11,fontWeight:800,color:"#1e3a5f",fontFamily:"'Barlow Condensed',sans-serif"}}>{metricFmt(m[pivotMetric],pivotMetric)}</span>
                        <span style={{fontSize:9,color:"#94a3b8"}}>{pct.toFixed(1)}%</span>
                      </div>
                    </div>
                    <div style={{height:8,background:"#f0f4fa",borderRadius:4,overflow:"hidden"}}>
                      <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,"+m.color+","+m.color+"99)",borderRadius:4,transition:"width .4s ease"}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

        </div>
      </div>
    </div>
  );
}


function App() {
  // ✅ USER LOGIN
  const [username, setUsername] = useState("");
  const [userInput, setUserInput] = useState("");

  // ✅ ARTICLES & REVISIONS
  const [articleList, setArticleList] = useState([]);
  const [revisionList, setRevisionList] = useState([]);

  // ✅ APPROVAL
  const [showApprove, setShowApprove] = useState(false);
  const [approver, setApprover] = useState("");

  // FOR HIDDEN BUTTONS
  const [hidden, setHidden] = useState(true);

  const [newArticle, setNewArticle] = useState("");
  const [newCustomer, setNewCustomer] = useState("");
  const [newRevision, setNewRevision] = useState("");

  const [matTypes,   setMatTypes]   = useState(DEFAULT_MATERIAL_TYPES);
  const [shellCols,  setShellCols]  = useState(DEFAULT_SHELL_COLS);
  const [header,     setHeader]     = useState({ article:"", customer:"", rev:"A01", preparedBy:"", checkedBy:"", modifiedBy:"", date:"", articleCode:"", ecNo:"", articleRev:"" });
  const [rows,       setRows,       undoRows, canUndo] = useUndoRows([mkRow(DEFAULT_SHELL_COLS, DEFAULT_MATERIAL_TYPES)]);
  const [editingId,  setEditingId]  = useState(null);
  const [form,       setForm]       = useState(null);
  const [filterType, setFilterType] = useState("ALL");
  const [search,     setSearch]     = useState("");
  const [inlineCell, setInlineCell] = useState(null);
  const [inlineVal,  setInlineVal]  = useState("");
  const [showMetric, setShowMetric] = useState("sqm");
  const [extraPct,   setExtraPct]   = useState(0);
  const [saveMsg,    setSaveMsg]    = useState("");
  const [lastSaved,  setLastSaved]  = useState(null);
  const [toast,      setToast]      = useState("");
  const [exporting,  setExporting]  = useState(false);
  const [exportMsg,  setExportMsg]  = useState("");
  const [activeModal,setActiveModal]= useState(null); // "matTypes"|"columns"|"importExcel"|null

  /* Material type form */
  const [newMat,    setNewMat]    = useState({ name:"", length:2.44, width:1.22, density:100, color:PALETTE[0] });
  const [editMatId, setEditMatId] = useState(null);

  /* Column manager form */
  const [newColLabel, setNewColLabel] = useState("");
  const [newColColor, setNewColColor] = useState(PALETTE[0]);
  const [newColCode,  setNewColCode]  = useState("");
  const [surfaces,    setSurfaces]    = useState(DEFAULT_SURFACES);
  const [newSurface,  setNewSurface]  = useState("");
  const [newColRev,   setNewColRev]   = useState("A");

  /* Excel import */
  const [importRows,    setImportRows]    = useState([]);
  const [importHeaders, setImportHeaders] = useState([]);
  const [importMapping, setImportMapping] = useState({});
  const [importFile,    setImportFile]    = useState("");

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(""), 2600); };

  // LOAD ARTICLE LIST FROM BACKEND
  useEffect(()=>{
    fetch("http://localhost:8080/articles")
      .then(r=>r.json())
      .then(data=>setArticleList(data))
      .catch(()=>console.log("API not ready"));
  },[]);

  // LOAD REVISIONS
  useEffect(()=>{
    if(header.article && header.customer){
      fetch(`http://localhost:8080/revisions?article=${header.article}&customer=${header.customer}`)
        .then(r=>r.json())
        .then(setRevisionList);
    }
  },[header.article, header.customer]);


  // AUTO LOAD DATA
  useEffect(()=>{
    if(header.article && header.customer && header.rev){
      fetch(`http://localhost:8080/load?article=${header.article}&customer=${header.customer}&revision=${header.rev}`)
        .then(r=>r.json())
        .then(data=>{
          if(data.rows){
            setRows(data.rows);
            setShellCols(data.shellCols);
            showToast("Loaded from DB");
          }
        });
    }
  },[header.rev]);

  /* Ctrl+Z shortcut */
  useEffect(() => {
    const handler = e => {
      if ((e.ctrlKey||e.metaKey) && e.key==="z" && !e.shiftKey) {
        e.preventDefault();
        if (canUndo) { undoRows(); showToast("Undone"); }
      }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [canUndo, undoRows]);

  /* Computed */
  const computed   = useMemo(() => rows.map(r => calcRow(r, shellCols, extraPct)), [rows, shellCols, extraPct]);
  const matNames   = useMemo(() => matTypes.map(m => m.name), [matTypes]);
  const filtered   = useMemo(() => computed.filter(r => {
    const mt = filterType==="ALL" || r.type===filterType;
    const ms = !search || r.description.toLowerCase().includes(search.toLowerCase()) || r.supplier.toLowerCase().includes(search.toLowerCase());
    return mt && ms;
  }), [computed, filterType, search]);

  const totals = useMemo(() => {
    const colTotals = {};
    shellCols.forEach(c => {
      colTotals[c.id] = {
        sheets:  computed.reduce((a,r)=>a+(r[c.id]||0),0),
        sqm:     computed.reduce((a,r)=>a+(r.colStats[c.id]?r.colStats[c.id].sqm:0),0),
        vol:     computed.reduce((a,r)=>a+(r.colStats[c.id]?r.colStats[c.id].vol:0),0),
        wt:      computed.reduce((a,r)=>a+(r.colStats[c.id]?r.colStats[c.id].wt:0),0),
        sqmBase: computed.reduce((a,r)=>a+(r.colStats[c.id]?r.colStats[c.id].sqmBase??r.colStats[c.id].sqm:0),0),
        volBase: computed.reduce((a,r)=>a+(r.colStats[c.id]?r.colStats[c.id].volBase??r.colStats[c.id].vol:0),0),
        wtBase:  computed.reduce((a,r)=>a+(r.colStats[c.id]?r.colStats[c.id].wtBase??r.colStats[c.id].wt:0),0),
      };
    });
    const totalWt = computed.reduce((a,r)=>a+r.totalWt,0);
    return {
      totalSheets: computed.reduce((a,r)=>a+r.totalSheets,0),
      totalSqm:    computed.reduce((a,r)=>a+r.totalSqm,0),
      totalVol:    computed.reduce((a,r)=>a+r.totalVol,0),
      totalWt,
      total: totalWt,
      colTotals,
    };
  }, [computed, shellCols]);

  /* Row helpers */
  const startInline = (rowId, colId, cur) => { setInlineCell({rowId,colId}); setInlineVal(String(cur)); };
  const commitInline = () => {
    if (!inlineCell) return;
    setRows(prev => prev.map(r => r.id===inlineCell.rowId ? {...r,[inlineCell.colId]:parseFloat(inlineVal)||0} : r));
    setInlineCell(null); setInlineVal("");
  };
  const openEdit  = row => { setEditingId(row.id); setForm({...row}); };
  const closeEdit = ()  => { setEditingId(null); setForm(null); };
  const saveEdit  = ()  => { setRows(prev => prev.map(r => r.id===editingId ? {...form} : r)); closeEdit(); };
  const deleteRow = id  => setRows(prev => prev.filter(r => r.id!==id));
  const dupRow    = row => { const idx=rows.findIndex(r=>r.id===row.id); const n=[...rows]; n.splice(idx+1,0,{...row,id:Date.now()}); setRows(n); };
  const addRow    = ()  => setRows(prev => [...prev, mkRow(shellCols, matTypes)]);
  const fmtM = v => showMetric==="sqm"?v.toFixed(3)+" m²":showMetric==="vol"?v.toFixed(3)+" m³":showMetric==="wt"?v.toFixed(3)+" kg":v.toFixed(2);

  /* When type selected in edit form → auto-fill dims */
  const handleTypeChange = t => {
    const m = matTypes.find(x=>x.name===t);
    if (m) setForm(f=>({...f, type:t, length:m.length, width:m.width, density:m.density}));
    else    setForm(f=>({...f, type:t}));
  };

  /* Shell columns */
  const addShellCol    = () => { if (!newColLabel.trim()) return; const id="sc_"+Date.now(); setShellCols(p=>[...p,{id,label:newColLabel.trim(),color:newColColor,itemCode:"",itemRev:"A"}]); setRows(p=>p.map(r=>({...r,[id]:0}))); setNewColLabel(""); };
  const removeShellCol = id => { setShellCols(p=>p.filter(c=>c.id!==id)); setRows(p=>p.map(r=>{const n={...r};delete n[id];return n;})); };
  const renameShellCol  = (id,label)    => setShellCols(p=>p.map(c=>c.id===id?{...c,label}:c));
  const recolorShellCol = (id,color)    => setShellCols(p=>p.map(c=>c.id===id?{...c,color}:c));
  const updateColCode   = (id,itemCode) => setShellCols(p=>p.map(c=>c.id===id?{...c,itemCode}:c));
  const updateColRev    = (id,itemRev)  => setShellCols(p=>p.map(c=>c.id===id?{...c,itemRev}:c));

  /* Material Types */
  const addMaterial = () => {
    if (!newMat.name.trim()) return;
    if (matTypes.some(m=>m.name===newMat.name.trim())) { showToast("Name already exists"); return; }
    setMatTypes(p=>[...p,{...newMat,name:newMat.name.trim(),id:"mt_"+Date.now()}]);
    setNewMat({name:"",length:2.44,width:1.22,density:100,color:PALETTE[0]});
    showToast("Material added");
  };
  const deleteMaterial = id => {
    const mat = matTypes.find(m=>m.id===id);
    if (!mat) return;
    const remaining = matTypes.filter(m=>m.id!==id);
    setMatTypes(remaining);
    setRows(prev=>prev.map(r=>r.type===mat.name?{...r,type:(remaining[0]?.name||"PET 100")}:r));
    showToast("Material deleted");
  };
  const updateMat = (id, field, val) => {
    setMatTypes(prev=>prev.map(m=>{
      if (m.id!==id) return m;
      const v = (field==="name"||field==="color") ? val : (parseFloat(val)||0);
      const updated = {...m,[field]:v};
      if (field!=="name"&&field!=="color") {
        setRows(prev2=>prev2.map(r=>r.type===m.name?{...r,[field]:v}:r));
      }
      return updated;
    }));
  };

  const saveToSQL = async () => {
    await fetch("http://localhost:8080/save", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        article: header.article,
        customer: header.customer,
        revision: header.rev,
        header,
        rows,
        shellCols
      })
    });

    showToast("Saved to SQL");
  };

  const approveData = async () => {
    await fetch("http://localhost:8080/approve", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        article: header.article,
        customer: header.customer,
        revision: header.rev,
        approver,
        header,
        rows,
        shellCols
      })
    });

    showToast("Approved successfully");
    setShowApprove(false);
  };



  /* Save / Load */
  const saveToFile = () => {
    const data = {version:4,savedAt:new Date().toISOString(),header,rows,shellCols,showMetric,matTypes,surfaces,extraPct};
    const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download=`SKAPS_BOM_${header.article||"PROJECT"}_${header.rev||"A01"}.bom.json`;
    a.click(); URL.revokeObjectURL(url);
    setLastSaved(new Date()); setSaveMsg("Saved!"); setTimeout(()=>setSaveMsg(""),2500);
    showToast("Session saved");
  };
  const loadFromFile = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.header)    setHeader(d.header);
        if (d.rows)      setRows(d.rows);
        if (d.shellCols) setShellCols(d.shellCols);
        if (d.showMetric)setShowMetric(d.showMetric);
        if (d.matTypes)  setMatTypes(d.matTypes);
        if (d.surfaces)  setSurfaces(d.surfaces);
        if (d.extraPct!=null) setExtraPct(d.extraPct);
        setLastSaved(d.savedAt?new Date(d.savedAt):new Date());
        showToast("Session loaded");
      } catch { alert("Could not read file. Use a valid .bom.json file."); }
    };
    reader.readAsText(file); e.target.value="";
  };

  /* Excel Import */
  const handleExcelUpload = e => {
    const file = e.target.files[0]; if (!file) return;
    setImportFile(file.name);
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = window.XLSX.read(ev.target.result,{type:"binary"});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const data = window.XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        if (data.length < 2) { showToast("No data found"); return; }
        const headers = data[0].map(h=>String(h).trim());
        const dataRows = data.slice(1).filter(r=>r.some(c=>c!==""));
        setImportHeaders(headers); setImportRows(dataRows);
        // auto-map
        const map = {};
        const aliases = {
          description:["description","desc","raw material description","material","name","raw material"],
          type:["type","material type","raw material type","mat type"],
          supplier:["supplier","vendor"],
          finishing:["finishing","finish"],
          surface:["surface"],
          length:["length","l(m)","l (m)","length (m)"],
          width:["width","w(m)","w (m)","width (m)"],
          thickness:["thickness","th(m)","th (m)","thickness (m)","th"],
          density:["density","density (kg/m3)","density (kg/m³)","dens"],
          partName:["part name","partname","part"],
        };
        headers.forEach((h,i)=>{
          const hl = h.toLowerCase();
          Object.entries(aliases).forEach(([field,alts])=>{ if(alts.includes(hl)) map[field]=i; });
          shellCols.forEach(sc=>{ if(hl===sc.label.toLowerCase()||hl===sc.label.toLowerCase()+" sheets") map[sc.id]=i; });
        });
        setImportMapping(map);
        setActiveModal("importExcel");
      } catch { showToast("Could not read Excel file"); }
    };
    reader.readAsBinaryString(file); e.target.value="";
  };

  const applyImport = mode => {
    const newRows = importRows.map(row=>{
      const get  = f => { const i=importMapping[f]; return i!=null?row[i]:""; };
      const getN = (f,def=0) => parseFloat(get(f))||def;
      const typeName = String(get("type")).trim();
      const mat = matTypes.find(m=>m.name===typeName) || matTypes[0];
      const shellData={};
      shellCols.forEach(c=>{ shellData[c.id]=getN(c.id,0); });
      return {
        id:Date.now()+Math.random(),
        description:String(get("description")).trim(),
        type:mat?mat.name:(matTypes[0]?.name||"PET 100"),

            </div>

            {/* Existing types */}
            <table style={{width:"100%",borderCollapse:"collapse",marginBottom:20,fontSize:11}}>
              <thead>
                <tr style={{background:"#e8f0fb"}}>
                  {["","NAME","LENGTH (m)","WIDTH (m)","DENSITY (kg/m³)","ACTIONS"].map((h,i)=>(
                    <th key={i} style={{...TH,padding:"7px 10px",fontSize:9}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {matTypes.map(m=>(
                  <tr key={m.id} style={{borderBottom:"1px solid #eee",background:editMatId===m.id?"#fdf6ff":"#fff"}}>
                    <td style={{...TD,width:40,textAlign:"center"}}>
                      <div style={{position:"relative",width:22,height:22,margin:"auto"}}>
                        <div style={{width:22,height:22,borderRadius:"50%",background:m.color,border:"2px solid #ddd"}}/>
                        {editMatId===m.id&&<input type="color" value={m.color} onChange={e=>updateMat(m.id,"color",e.target.value)} style={{position:"absolute",inset:0,opacity:0,cursor:"pointer"}}/>}
                      </div>
                    </td>
                    <td style={TD}>
                      {editMatId===m.id
                        ?<input value={m.name} onChange={e=>updateMat(m.id,"name",e.target.value)} style={{...iStyle,width:130}}/>
                        :<strong style={{color:m.color}}>{m.name}</strong>}
                    </td>
                    <td style={TD}>
                      {editMatId===m.id
                        ?<input type="number" value={m.length} onChange={e=>updateMat(m.id,"length",e.target.value)} style={{...iStyle,width:80}}/>
                        :m.length.toFixed(2)}
                    </td>
                    <td style={TD}>
                      {editMatId===m.id
                        ?<input type="number" value={m.width} onChange={e=>updateMat(m.id,"width",e.target.value)} style={{...iStyle,width:80}}/>
                        :m.width.toFixed(2)}
                    </td>
                    <td style={TD}>
                      {editMatId===m.id
                        ?<input type="number" value={m.density} onChange={e=>updateMat(m.id,"density",e.target.value)} style={{...iStyle,width:90}}/>
                        :m.density}
                    </td>
                    <td style={{...TD,whiteSpace:"nowrap"}}>
                      {editMatId===m.id
                        ?<button onClick={()=>setEditMatId(null)} style={{...btnPrimary,padding:"3px 12px",fontSize:10}}>✓ Done</button>
                        :<button onClick={()=>setEditMatId(m.id)} style={{...btnSmall,fontSize:10}}>✏ Edit</button>}
                      <button onClick={()=>deleteMaterial(m.id)} title="Delete material type" style={{...btnSmall,marginLeft:5,borderColor:"#e74c3c",color:"#e74c3c",fontSize:10}}>✕ Del</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>

            {/* Add new */}
            <div style={{borderTop:"2px solid #9b309022",paddingTop:14}}>
              <div style={{fontSize:9,color:"#9b3090",letterSpacing:1,fontWeight:700,marginBottom:10}}>+ ADD NEW MATERIAL TYPE</div>
              <div style={{display:"grid",gridTemplateColumns:"32px 1fr 100px 100px 120px 80px",gap:8,alignItems:"end"}}>
                <div style={{position:"relative",paddingTop:16}}>
                  <div style={{width:26,height:26,borderRadius:"50%",background:newMat.color,border:"2px solid #ddd",cursor:"pointer"}}/>
                  <input type="color" value={newMat.color} onChange={e=>setNewMat(m=>({...m,color:e.target.value}))} style={{position:"absolute",inset:0,opacity:0,cursor:"pointer"}}/>
                </div>
                {[["name","NAME","text"],["length","LENGTH (m)","number"],["width","WIDTH (m)","number"],["density","DENSITY (kg/m³)","number"]].map(([k,l,t])=>(
                  <div key={k}>
                    <div style={{fontSize:8,color:"#aaa",marginBottom:3,fontWeight:600}}>{l}</div>
                    <input type={t} value={newMat[k]} placeholder={k==="name"?"e.g. FOAM 50":""} onChange={e=>setNewMat(m=>({...m,[k]:t==="number"?parseFloat(e.target.value)||0:e.target.value}))} style={iStyle}/>
                  </div>
                ))}
                <div style={{paddingTop:16}}>
                  <button onClick={addMaterial} style={{...btnPrimary,background:"#9b3090",width:"100%",padding:"6px 0"}}>+ ADD</button>
                </div>
              </div>
              <div style={{marginTop:8,display:"flex",gap:4,flexWrap:"wrap"}}>
                {PALETTE.map(p=><div key={p} onClick={()=>setNewMat(m=>({...m,color:p}))} style={{width:16,height:16,borderRadius:"50%",background:p,cursor:"pointer",border:newMat.color===p?"2.5px solid #1e3a5f":"2px solid transparent"}}/>)}
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"flex-end",marginTop:16}}>
              <button onClick={()=>setActiveModal(null)} style={btnPrimary}>Done</button>
            </div>
          </div>
        </div>
      )}


      {/* ══════════════════════════════════════════════════════
          MODAL — COLUMN MANAGER
      ══════════════════════════════════════════════════════ */}
      {activeModal==="columns"&&(
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setActiveModal(null);}}>
          <div className="modal-box" style={{borderTop:"3px solid #e6920a",width:600,maxWidth:"95vw"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:18,color:"#1e3a5f",letterSpacing:2}}>⚙ MANAGE SHELL COLUMNS</div>
              <button onClick={()=>setActiveModal(null)} style={{background:"transparent",border:"none",color:"#bbb",fontSize:20,cursor:"pointer"}}>✕</button>
            </div>
            <div style={{fontSize:10,color:"#7a9bc4",marginBottom:14,background:"#f0f5fb",padding:"10px 14px",borderRadius:6,border:"1px solid #d0dcea"}}>
              Each column = one shell part (e.g. Suction Side, Pressure Side). Set its <strong>Item Code</strong> and <strong>Revision</strong> — these appear in the table header and export.
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:18}}>
              {shellCols.map(c=>(
                <div key={c.id} style={{background:"#fff",padding:"12px 16px",borderRadius:8,border:"2px solid "+c.color+"44",marginBottom:2,borderLeft:"4px solid "+c.color}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <div style={{position:"relative",flexShrink:0}}>
                      <div style={{width:22,height:22,borderRadius:"50%",background:c.color,border:"2px solid #fff",boxShadow:"0 1px 4px rgba(0,0,0,.15)"}}/>
                      <input type="color" value={c.color} onChange={e=>recolorShellCol(c.id,e.target.value)} style={{position:"absolute",inset:0,opacity:0,cursor:"pointer",width:22,height:22}}/>
                    </div>
                    <input value={c.label} onChange={e=>renameShellCol(c.id,e.target.value)} style={{...iStyle,flex:1,fontWeight:700,fontSize:12,color:c.color,borderColor:c.color+"44",background:c.color+"08"}} placeholder="Column label"/>
                    <button onClick={()=>removeShellCol(c.id)} style={{background:"#fff5f5",border:"1.5px solid #fca5a5",color:"#e74c3c",padding:"4px 11px",fontSize:10,borderRadius:5,cursor:"pointer",flexShrink:0,fontWeight:700}}>✕ Remove</button>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 120px",gap:8}}>
                    <div>
                      <div style={{fontSize:8,color:"#7a9bc4",fontWeight:700,letterSpacing:1,marginBottom:4}}>ITEM CODE</div>
                      <input value={c.itemCode||""} onChange={e=>updateColCode(c.id,e.target.value)} style={{...iStyle,fontSize:11}} placeholder="e.g. SK-SUCT-001"/>
                    </div>
                    <div>
                      <div style={{fontSize:8,color:"#7a9bc4",fontWeight:700,letterSpacing:1,marginBottom:4}}>REVISION</div>
                      <input value={c.itemRev||""} onChange={e=>updateColRev(c.id,e.target.value)} style={{...iStyle,fontSize:11}} placeholder="A"/>
                    </div>
                  </div>
                  {(c.itemCode||c.itemRev)&&(
                    <div style={{marginTop:8,display:"flex",gap:6,alignItems:"center"}}>
                      <span style={{fontSize:8,color:"#94a3b8"}}>PREVIEW:</span>
                      {c.itemCode&&<span style={{background:c.color+"15",color:c.color,border:"1px solid "+c.color+"44",borderRadius:4,padding:"2px 8px",fontSize:9,fontWeight:700}}>{c.itemCode}</span>}
                      {c.itemRev&&<span style={{background:c.color,color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:9,fontWeight:700}}>Rev {c.itemRev}</span>}
                    </div>
                  )}
                </div>
              ))}
              {shellCols.length===0&&<div style={{color:"#ccc",fontSize:11,textAlign:"center",padding:"12px 0"}}>No columns yet.</div>}
            </div>
            <div style={{borderTop:"2px solid #f0f4fa",paddingTop:16}}>
              <div style={{fontSize:9,color:"#4a6fa8",letterSpacing:1.5,marginBottom:12,fontWeight:800}}>+ ADD NEW COLUMN</div>
              <div style={{display:"grid",gridTemplateColumns:"auto 1fr 120px 100px",gap:8,alignItems:"end",marginBottom:10}}>
                <div>
                  <div style={{fontSize:8,color:"#7a9bc4",fontWeight:700,letterSpacing:1,marginBottom:4}}>COLOR</div>
                  <div style={{display:"flex",gap:3,flexWrap:"wrap",maxWidth:80}}>{PALETTE.map(p=><div key={p} onClick={()=>setNewColColor(p)} style={{width:16,height:16,borderRadius:"50%",background:p,cursor:"pointer",border:newColColor===p?"2.5px solid #1e3a5f":"1.5px solid transparent",boxShadow:newColColor===p?"0 0 0 1px #fff inset":""}}/>)}</div>
                </div>
                <div>
                  <div style={{fontSize:8,color:"#7a9bc4",fontWeight:700,letterSpacing:1,marginBottom:4}}>LABEL</div>
                  <input value={newColLabel} onChange={e=>setNewColLabel(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addShellCol()} placeholder="e.g. Root – PET" style={{...iStyle,fontWeight:600}}/>
                </div>
                <div>
                  <div style={{fontSize:8,color:"#7a9bc4",fontWeight:700,letterSpacing:1,marginBottom:4}}>ITEM CODE</div>
                  <input value={newColCode} onChange={e=>setNewColCode(e.target.value)} placeholder="SK-001" style={{...iStyle}}/>
                </div>
                <div>
                  <div style={{fontSize:8,color:"#7a9bc4",fontWeight:700,letterSpacing:1,marginBottom:4}}>REVISION</div>
                  <input value={newColRev} onChange={e=>setNewColRev(e.target.value)} placeholder="A" style={{...iStyle}}/>
                </div>
              </div>
              <button onClick={()=>{
                if(!newColLabel.trim())return;
                const id="sc_"+Date.now();
                setShellCols(p=>[...p,{id,label:newColLabel.trim(),color:newColColor,itemCode:newColCode,itemRev:newColRev||"A"}]);
                setRows(p=>p.map(r=>({...r,[id]:0})));
                setNewColLabel(""); setNewColCode(""); setNewColRev("A");
              }} style={{...btnPrimary,width:"100%",marginBottom:14}}>+ Add Column</button>
              <div>
                <div style={{fontSize:9,color:"#94a3b8",letterSpacing:1,marginBottom:6,fontWeight:600}}>QUICK PRESETS</div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {[["Suction - BALSA","#c87530"],["Suction - PET","#2563a8"],["Pressure - PET","#2563a8"],["Pressure - BALSA","#c87530"],["LE Reinf - PET","#2d8a3e"],["TE Reinf - BALSA","#c87530"],["Root - PET","#9b3090"],["Web - BALSA","#c87530"]].map(([label,color])=>{
                    const already=shellCols.some(c=>c.label===label);
                    return <button key={label} disabled={already} onClick={()=>{if(!already){const id="sc_"+Date.now();setShellCols(p=>[...p,{id,label,color,itemCode:"",itemRev:"A"}]);setRows(p=>p.map(r=>({...r,[id]:0})));} }} style={{background:already?"#f8fafc":"#fff",color:already?"#c8d8ee":color,border:`1.5px solid ${already?"#e4eaf4":color}`,padding:"4px 10px",fontSize:9,borderRadius:4,cursor:already?"not-allowed":"pointer",fontWeight:700,opacity:already?0.6:1}}>{already?"✓ ":""}{label}</button>;
                  })}
                </div>
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"flex-end",marginTop:16}}><button onClick={()=>setActiveModal(null)} style={btnPrimary}>Done</button></div>
          </div>
        </div>
      )}


      {/* ══════════════════════════════════════════════════════
          MODAL — EXCEL IMPORT
      ══════════════════════════════════════════════════════ */}
      {activeModal==="importExcel"&&(
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setActiveModal(null);}}>
          <div className="modal-box" style={{borderTop:"3px solid #2d8a3e",width:800,maxWidth:"95vw"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:18,color:"#1e3a5f",letterSpacing:2}}>📥 IMPORT FROM EXCEL</div>
              <button onClick={()=>setActiveModal(null)} style={{background:"transparent",border:"none",color:"#bbb",fontSize:20,cursor:"pointer"}}>✕</button>
            </div>
            <div style={{fontSize:10,color:"#888",marginBottom:14,background:"#edfff2",padding:"8px 12px",borderRadius:4,border:"1px solid #2d8a3e22"}}>
              File: <strong style={{color:"#2d8a3e"}}>{importFile}</strong> — <strong>{importRows.length}</strong> data rows. Map your Excel columns to BOM fields below. Unmapped fields will use defaults.
            </div>

            <div style={{marginBottom:16}}>
              <div style={{fontSize:9,color:"#2d8a3e",letterSpacing:1,fontWeight:700,marginBottom:10}}>COLUMN MAPPING — Excel column → BOM field</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                {[
                  ["description","DESCRIPTION"],
                  ["type","MATERIAL TYPE"],
                  ["supplier","SUPPLIER"],
                  ["finishing","FINISHING"],
                  ["surface","SURFACE"],
                  ["length","LENGTH (m)"],
                  ["width","WIDTH (m)"],
                  ["thickness","THICKNESS (m)"],
                  ["density","DENSITY (kg/m³)"],
                  ...shellCols.map(c=>[c.id, c.label+" SHEETS"])
                ].map(([field,label])=>(
                  <div key={field}>
                    <div style={{fontSize:8,color:"#888",marginBottom:2,fontWeight:600}}>{label}</div>
                    <select value={importMapping[field]!=null?importMapping[field]:""} onChange={e=>setImportMapping(m=>({...m,[field]:e.target.value!==""?parseInt(e.target.value):undefined}))} style={{...iStyle,fontSize:10,padding:"4px 8px"}}>
                      <option value="">— skip —</option>
                      {importHeaders.map((h,i)=><option key={i} value={i}>{h||`Col ${i+1}`}</option>)}
                    </select>
                  </div>
                ))}
              </div>
            </div>

            {importRows.length>0&&(
              <div style={{marginBottom:16}}>
                <div style={{fontSize:9,color:"#aaa",letterSpacing:1,fontWeight:700,marginBottom:6}}>DATA PREVIEW — first 3 rows</div>
                <div style={{overflowX:"auto",borderRadius:4,border:"1px solid #dde1ea"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:9}}>
                    <thead>
                      <tr style={{background:"#e8f0fb"}}>
                        {importHeaders.map((h,i)=><th key={i} style={{...TH,fontSize:8,padding:"5px 8px"}}>{h||`Col ${i+1}`}</th>)}
                      </tr>
                    </thead>
                    <tbody>
                      {importRows.slice(0,3).map((row,ri)=>(
                        <tr key={ri} style={{borderBottom:"1px solid #eee"}}>
                          {row.map((cell,ci)=><td key={ci} style={{...TD,fontSize:9,padding:"4px 8px"}}>{String(cell)}</td>)}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            <div style={{display:"flex",gap:10,justifyContent:"flex-end",alignItems:"center"}}>
              <span style={{fontSize:9,color:"#aaa",marginRight:4}}>Import mode:</span>
              <button onClick={()=>setActiveModal(null)} style={{...btnSmall,padding:"7px 16px"}}>CANCEL</button>
              <button onClick={()=>applyImport("append")} style={{...btnPrimary,background:"#2563a8"}}>+ APPEND TO TABLE</button>
              <button onClick={()=>applyImport("replace")} style={{...btnPrimary,background:"#2d8a3e"}}>⟳ REPLACE ALL ROWS</button>
            </div>
          </div>
        </div>
      )}


      {/* ══════════════════════════════════════════════════════
          MODAL — EDIT ROW SPECS
      ══════════════════════════════════════════════════════ */}
      {editingId&&form&&(
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)closeEdit();}}>
          <div className="modal-box" style={{borderTop:"3px solid #7c3aed",width:660}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:18,color:"#1e3a5f",letterSpacing:2}}>EDIT SHEET SPECIFICATIONS</div>
              <button onClick={closeEdit} style={{background:"transparent",border:"none",color:"#bbb",fontSize:20,cursor:"pointer"}}>✕</button>
            </div>
            <div style={{fontSize:10,color:"#888",marginBottom:14,background:"#f5f0ff",padding:"8px 12px",borderRadius:4,border:"1px solid #7c3aed22"}}>
              Selecting a <strong>Material Type</strong> auto-fills Length, Width &amp; Density from the Material Types library.
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[["description","DESCRIPTION","text"],["supplier","SUPPLIER","text"],["finishing","FINISHING","text"],["length","LENGTH (m)","number"],["width","WIDTH (m)","number"],["thickness","THICKNESS (m)","number"],["density","DENSITY (kg/m³)","number"]].map(([k,l,t])=>(
                <div key={k} style={k==="description"?{gridColumn:"1/-1"}:{}}>
                  <div style={{fontSize:9,color:"#aaa",letterSpacing:1,marginBottom:3,fontWeight:600}}>{l}</div>
                  {fInp(k,t)}
                </div>
              ))}
              <div>
                <div style={{fontSize:9,color:"#aaa",letterSpacing:1,marginBottom:3,fontWeight:600}}>MATERIAL TYPE</div>
                <select value={form.type} onChange={e=>handleTypeChange(e.target.value)} style={iStyle}>
                  {matNames.map(o=><option key={o}>{o}</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:9,color:"#aaa",letterSpacing:1,marginBottom:3,fontWeight:600}}>SURFACE</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:4}}>
                  {surfaces.map(s=>(
                    <button key={s} onClick={()=>setForm(f=>({...f,surface:s}))}
                      style={{padding:"4px 10px",fontSize:10,borderRadius:4,cursor:"pointer",fontFamily:"inherit",fontWeight:700,border:"1.5px solid "+(form.surface===s?"#e6920a":"#d0dcea"),background:form.surface===s?"#fff4e0":"#f8fafc",color:form.surface===s?"#e6920a":"#7a9bc4",transition:"all .12s"}}>
                      {s}
                    </button>
                  ))}
                </div>
                <div style={{display:"flex",gap:4,marginTop:2}}>
                  <input value={newSurface} onChange={e=>setNewSurface(e.target.value.toUpperCase())} onKeyDown={e=>{if(e.key==="Enter"&&newSurface.trim()){setSurfaces(p=>[...p,newSurface.trim()]);setForm(f=>({...f,surface:newSurface.trim()}));setNewSurface("");}}} placeholder="+ Add surface type" style={{...iStyle,flex:1,fontSize:10,padding:"4px 8px"}}/>
                  <button onClick={()=>{if(newSurface.trim()){setSurfaces(p=>[...p,newSurface.trim()]);setForm(f=>({...f,surface:newSurface.trim()}));setNewSurface("");}}} style={{background:"#e6920a",color:"#fff",border:"none",padding:"4px 12px",borderRadius:4,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>+ Add</button>
                </div>
              </div>
            </div>
            <div style={{marginTop:14,borderTop:"1px solid #eee",paddingTop:12}}>
              <div style={{fontSize:9,color:"#e6920a",letterSpacing:1,fontWeight:700,marginBottom:8}}>LIVE PREVIEW — AUTO-CALC PER COLUMN</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>
                {shellCols.map(c=>{
                  const sheets=rows.find(rr=>rr.id===editingId)?.[c.id]||0;
                  const s=calcColStats(sheets,form,extraPct);
                  return (
                    <div key={c.id} style={{background:"#f7f8fb",border:`1px solid ${c.color}33`,borderRadius:4,padding:"8px 10px"}}>
                      <div style={{fontSize:9,fontWeight:700,color:c.color,marginBottom:4}}>{c.label} <span style={{color:"#aaa",fontWeight:400}}>({sheets} sheets)</span></div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4}}>
                        {[["SQM",s.sqm.toFixed(3),"m²","#1a6fa8"],["VOL",s.vol.toFixed(3),"m³","#2d8a3e"],["WT",s.wt.toFixed(3),"kg","#b8600a"]].map(([l,v,u,cc])=>(
                          <div key={l}>
                            <div style={{fontSize:8,color:"#aaa"}}>{l}</div>
                            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:800,color:cc}}>{v}<span style={{fontSize:8,color:"#bbb",marginLeft:2}}>{u}</span></div>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
            <div style={{display:"flex",gap:10,marginTop:16,justifyContent:"flex-end"}}>
              <button onClick={closeEdit} style={{...btnSmall,padding:"7px 18px"}}>CANCEL</button>
              <button onClick={saveEdit} style={btnPrimary}>SAVE SPECS</button>
            </div>
          </div>
        </div>
      )}

      {/* ══════════════════════════════════════════════════════
          MODAL — ANALYTICS
      ══════════════════════════════════════════════════════ */}
      {activeModal==="analytics"&&(
        <AnalyticsModal
          computed={computed}
          shellCols={shellCols}
          matTypes={matTypes}
          totals={totals}
          header={header}
          onClose={()=>setActiveModal(null)}
        />
      )}

      {/* ✅ APPROVE MODAL */}
      {showApprove && (
        <div className="modal-overlay" onClick={(e)=>{if(e.target===e.currentTarget)setShowApprove(false);}}>
          <div className="modal-box" style={{width:320}}>

            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <div style={{fontWeight:800}}>Approve BOM</div>
              <button onClick={()=>setShowApprove(false)}>✕</button>
            </div>

            <input
              placeholder="Enter Approver Name"
              value={approver}
              onChange={(e)=>setApprover(e.target.value)}
              style={{...iStyle, width:"100%", marginBottom:10}}
            />

            <button
              onClick={approveData}
              style={{...btnPrimary, width:"100%"}}
            >
              Submit Approval
            </button>

          </div>
        </div>
      )}

      {/* ── TOAST ── */}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {hasError:false, error:null}; }
  static getDerivedStateFromError(error) { return {hasError:true, error}; }
  componentDidCatch(error, info) { console.error("BOM App Error:", error, info); }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{padding:40,fontFamily:"'JetBrains Mono',monospace",background:"#1e3a5f",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:12,padding:32,maxWidth:560,textAlign:"center",boxShadow:"0 8px 40px rgba(0,0,0,.3)"}}>
            <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
            <div style={{fontWeight:800,fontSize:16,color:"#1e3a5f",marginBottom:8}}>Something went wrong</div>
            <div style={{fontSize:11,color:"#94a3b8",marginBottom:20,lineHeight:1.6}}>{this.state.error?.message||"An unexpected error occurred"}</div>
            <button onClick={()=>this.setState({hasError:false,error:null})} style={{background:"#e6920a",color:"#fff",border:"none",padding:"10px 24px",borderRadius:6,fontWeight:800,fontSize:12,cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>
              ↺ RECOVER
            </button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
